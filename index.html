<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>직캠 유튜브 도우미</title>
<meta name="description" content="콘서트 직캠 유튜브 업로드 정보 자동 생성기" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#ffffff" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f4; --bg3: #eeece8;
    --text: #1a1a1a; --text2: #6b6b6b; --text3: #9a9a9a;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --radius: 8px; --radius-lg: 12px;
    --danger: #a32d2d; --danger-bg: #fcebeb;
    --success-bg: #eaf3de; --success: #3b6d11;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1c; --bg2: #252525; --bg3: #2e2e2e;
      --text: #f0f0f0; --text2: #aaaaaa; --text3: #666666;
      --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
      --danger: #f09595; --danger-bg: #3a1f1f;
      --success-bg: #1e3012; --success: #97c459;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
  .container { max-width: 680px; margin: 0 auto; padding: 16px; }
  .header { text-align: center; padding: 24px 0 16px; }
  .header h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .header p { font-size: 13px; color: var(--text2); }
  .card { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 1.25rem; margin-bottom: 12px; }
  .tabs { display: flex; border-bottom: 0.5px solid var(--border); margin-bottom: 1.25rem; }
  .tab { padding: 10px 20px; font-size: 14px; cursor: pointer; border: none; background: none; color: var(--text2); border-bottom: 2px solid transparent; transition: all 0.2s; font-family: inherit; }
  .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
  .section { display: none; }
  .section.active { display: block; }
  label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 5px; }
  input, select, textarea {
    width: 100%; font-family: inherit; font-size: 14px; color: var(--text);
    background: var(--bg); border: 0.5px solid var(--border2);
    border-radius: var(--radius); padding: 9px 12px; outline: none;
    transition: border-color 0.15s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--text2); }
  textarea { resize: vertical; line-height: 1.6; }
  select { cursor: pointer; }
  .venue-wrap { display: flex; flex-direction: column; gap: 6px; }
  .venue-custom { display: none; }
  .venue-custom.show { display: block; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }
  .form-row { margin-bottom: 10px; }
  .session-card { background: var(--bg2); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.25rem; }
  .session-title { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
  .session-tags { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .stag { background: var(--bg); border: 0.5px solid var(--border2); border-radius: 99px; padding: 3px 10px; font-size: 12px; color: var(--text); }
  .btn-primary { width: 100%; padding: 12px; font-size: 15px; font-weight: 500; cursor: pointer; background: var(--text); color: var(--bg); border: none; border-radius: var(--radius); transition: opacity 0.15s; font-family: inherit; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; cursor: default; }
  .btn-outline { padding: 7px 14px; font-size: 13px; cursor: pointer; border: 0.5px solid var(--border2); background: var(--bg); border-radius: var(--radius); color: var(--text2); transition: background 0.15s; font-family: inherit; }
  .btn-outline:hover { background: var(--bg2); color: var(--text); }
  .btn-sm { font-size: 12px; padding: 3px 10px; border: 0.5px solid var(--border2); border-radius: 99px; background: none; cursor: pointer; color: var(--text2); white-space: nowrap; font-family: inherit; }
  .btn-sm:hover { color: var(--text); }
  .btn-sm:disabled { opacity: 0.4; cursor: default; }
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 1.25rem 0; }
  .section-label { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 10px; }
  .upload-zone { border: 1.5px dashed var(--border2); border-radius: var(--radius-lg); padding: 1.25rem; text-align: center; cursor: pointer; transition: border-color 0.2s; margin-bottom: 10px; }
  .upload-zone:hover { border-color: var(--text2); }
  .upload-hint { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .upload-hint strong { color: var(--text); }
  .preview-img { max-width: 100%; max-height: 160px; border-radius: var(--radius); margin-top: 10px; }
  .song-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .song-input-row input { flex: 1; }
  .song-input-row button { white-space: nowrap; padding: 0 16px; height: 38px; font-size: 13px; cursor: pointer; background: var(--text); color: var(--bg); border: none; border-radius: var(--radius); font-family: inherit; }
  .song-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .song-item { display: flex; align-items: center; gap: 8px; background: var(--bg2); border-radius: var(--radius); padding: 8px 12px; }
  .song-num { font-size: 12px; color: var(--text3); min-width: 18px; }
  .song-name { font-size: 14px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
  .status-done { background: var(--success-bg); color: var(--success); }
  .status-pending { background: var(--bg); color: var(--text3); border: 0.5px solid var(--border); }
  .result-box { background: var(--bg2); border-radius: var(--radius); padding: 1rem; margin-bottom: 8px; position: relative; }
  .result-label { font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .result-text { font-size: 13px; color: var(--text); line-height: 1.7; white-space: pre-wrap; word-break: break-word; padding-right: 52px; }
  .copy-btn { position: absolute; top: 10px; right: 10px; font-size: 11px; padding: 3px 9px; cursor: pointer; background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius); color: var(--text2); font-family: inherit; }
  .copy-btn:hover { color: var(--text); }
  .lang-label { font-size: 11px; font-weight: 500; color: var(--text2); margin-bottom: 4px; }
  .result-song-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .result-song-name { font-size: 14px; font-weight: 500; }
  .err { color: var(--danger); font-size: 13px; margin-top: 6px; }
  .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .filter-btn { font-size: 12px; padding: 4px 12px; border: 0.5px solid var(--border2); border-radius: 99px; background: none; color: var(--text2); cursor: pointer; font-family: inherit; }
  .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .history-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s; }
  .history-card:hover { border-color: var(--border2); }
  .history-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .history-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
  .htag { background: var(--bg2); border-radius: 99px; padding: 2px 8px; font-size: 11px; color: var(--text2); }
  .history-preview { font-size: 12px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .empty { text-align: center; padding: 3rem; color: var(--text2); font-size: 14px; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: flex-start; justify-content: center; z-index: 100; padding: 1rem; overflow-y: auto; }
  .detail-card { background: var(--bg); border-radius: var(--radius-lg); padding: 1.5rem; max-width: 620px; width: 100%; margin: auto; }
  .detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
  .close-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text2); line-height: 1; }
  .loading-dots { display: inline-flex; gap: 4px; align-items: center; }
  .dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--text2); animation: blink 1.2s infinite; }
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
  .search-bar { width: 100%; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎤 직캠 유튜브 도우미</h1>
    <p>콘서트 직캠 유튜브 제목 · 설명 · 해시태그 자동 생성</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('generate')">생성하기</button>
      <button class="tab" onclick="switchTab('history')">저장 목록</button>
    </div>

    <div id="tab-generate" class="section active">
      <div id="session-edit">
        <div class="session-title">콘서트 정보 (한 번만 입력)</div>
        <div class="form-grid">
          <div><label>가수 이름 *</label><input type="text" id="artist" placeholder="예: 아이오아이" /></div>
          <div><label>팬클럽 이름</label><input type="text" id="fanclub" placeholder="예: WANNA-ONE" /></div>
        </div>
        <div class="form-row"><label>콘서트 이름 *</label><input type="text" id="concert" placeholder="예: 2026 I.O.I Concert Tour: LOOP in SEOUL" /></div>
        <div class="form-grid">
          <div>
            <label>공연장 *</label>
            <div class="venue-wrap">
              <select id="venue-select" onchange="handleVenueSelect()">
                <option value="">-- 공연장 선택 --</option>
                <option value="올림픽홀">올림픽홀</option>
                <option value="장충체육관">장충체육관</option>
                <option value="SK 핸드볼경기장">SK 핸드볼경기장</option>
                <option value="COEX Hall">COEX Hall</option>
                <option value="잠실실내체육관">잠실실내체육관</option>
                <option value="인스파이어 아레나">인스파이어 아레나</option>
                <option value="KSPO Dome (체조경기장)">KSPO Dome (체조경기장)</option>
                <option value="고척 스카이돔">고척 스카이돔</option>
                <option value="서울월드컵경기장">서울월드컵경기장</option>
                <option value="고양종합운동장">고양종합운동장</option>
                <option value="KINTEX 전시장">KINTEX 전시장</option>
                <option value="__custom__">직접 입력...</option>
              </select>
              <input type="text" id="venue-custom" class="venue-custom" placeholder="공연장명 직접 입력" />
            </div>
          </div>
          <div><label>날짜 *</label><input type="date" id="date" /></div>
        </div>
        <div class="form-row"><label>촬영 구역</label><input type="text" id="zone" placeholder="예: F2구역 2열" /></div>
        <button class="btn-primary" onclick="saveSession()">저장하고 곡 입력하기 →</button>
        <div id="session-err" class="err" style="display:none;"></div>
      </div>

      <div id="session-view" style="display:none;">
        <div class="session-card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <span class="session-title" style="margin:0;">콘서트 정보</span>
            <button class="btn-sm" onclick="editSession()">수정</button>
          </div>
          <div class="session-tags" id="session-tags"></div>
        </div>

        <hr class="divider" />

        <div class="section-label">플레이리스트 이미지로 자동 분석</div>
        <div class="upload-zone" onclick="document.getElementById('img-upload').click()">
          <input type="file" id="img-upload" accept="image/*" style="display:none;" onchange="handleImage(event)" />
          <div class="upload-hint">클릭하여 <strong>플레이리스트 / 셋리스트 사진</strong> 업로드<br/>이미지에서 곡 목록을 자동으로 추출해요</div>
          <div id="img-preview"></div>
        </div>
        <button class="btn-outline" id="analyze-btn" onclick="analyzeImage()" disabled style="width:100%;margin-bottom:6px;">이미지 분석 → 곡 목록 자동 추출</button>

        <hr class="divider" />

        <div class="section-label">곡 제목 직접 입력</div>
        <div class="song-input-row">
          <input type="text" id="manual-song" placeholder="곡 제목 입력 후 추가 (엔터)" onkeydown="if(event.key==='Enter')addSong()" />
          <button onclick="addSong()">+ 추가</button>
        </div>

        <div id="song-list-wrap" style="display:none;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <div class="section-label" style="margin:0;">곡 목록</div>
            <button class="btn-sm" onclick="clearSongs()" style="color:var(--danger);border-color:var(--danger);">초기화</button>
          </div>
          <div class="song-list" id="song-list"></div>
          <button class="btn-primary" id="gen-all-btn" onclick="generateAll()">전체 곡 유튜브 정보 생성하기</button>
        </div>

        <div id="results-area"></div>
      </div>
    </div>

    <div id="tab-history" class="section">
      <input type="text" class="search-bar" id="search-input" placeholder="가수, 곡, 콘서트 검색..." oninput="renderHistory()" />
      <div class="filter-bar" id="filter-bar"></div>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<!-- 상세보기 모달 -->
<div id="overlay" class="overlay" style="display:none;" onclick="closeDetail(event)">
  <div class="detail-card">
    <div class="detail-header">
      <div>
        <div style="font-size:16px;font-weight:500;" id="d-title"></div>
        <div class="history-meta" id="d-meta" style="margin-top:5px;"></div>
      </div>
      <button class="close-btn" onclick="closeDetail()">×</button>
    </div>
    <div id="d-results"></div>
    <div style="margin-top:10px;">
      <button class="btn-outline" onclick="deleteEntry()" style="width:100%;color:var(--danger);border-color:var(--danger);">삭제하기</button>
    </div>
  </div>
</div>

<script>
let songs = [];
let results = {};
let uploadedB64 = null;
let uploadedMime = 'image/jpeg';
let activeFilter = 'all';
let currentDetailId = null;

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function getDB(){ try{ return JSON.parse(localStorage.getItem('fancam_db_v3')||'[]'); }catch(e){ return []; } }
function setDB(d){ localStorage.setItem('fancam_db_v3', JSON.stringify(d)); }

function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(i===0&&t==='generate')||(i===1&&t==='history')));
  document.getElementById('tab-generate').classList.toggle('active',t==='generate');
  document.getElementById('tab-history').classList.toggle('active',t==='history');
  if(t==='history'){ buildFilters(); renderHistory(); }
}

function handleVenueSelect(){
  const sel = document.getElementById('venue-select').value;
  const custom = document.getElementById('venue-custom');
  if(sel === '__custom__'){
    custom.classList.add('show');
    custom.focus();
  } else {
    custom.classList.remove('show');
    custom.value = '';
  }
}

function getVenue(){
  const sel = document.getElementById('venue-select').value;
  if(sel === '__custom__') return document.getElementById('venue-custom').value.trim();
  return sel;
}

function saveSession(){
  const artist = document.getElementById('artist').value.trim();
  const concert = document.getElementById('concert').value.trim();
  const venue = getVenue();
  const date = document.getElementById('date').value;
  const err = document.getElementById('session-err');
  if(!artist||!concert||!venue||!date){
    err.textContent = '가수, 콘서트, 공연장, 날짜는 필수입니다.';
    err.style.display = 'block'; return;
  }
  err.style.display = 'none';
  const fanclub = document.getElementById('fanclub').value.trim();
  const zone = document.getElementById('zone').value.trim();
  const tags = [artist, concert, venue, fmtDate(date)];
  if(zone) tags.push(zone);
  if(fanclub) tags.push(fanclub);
  document.getElementById('session-tags').innerHTML = tags.map(t=>`<span class="stag">${esc(t)}</span>`).join('');
  document.getElementById('session-edit').style.display = 'none';
  document.getElementById('session-view').style.display = 'block';
}

function editSession(){
  document.getElementById('session-edit').style.display = 'block';
  document.getElementById('session-view').style.display = 'none';
}

function fmtDate(d){
  const dt = new Date(d);
  return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;
}
function fmtDateKor(d){
  const dt = new Date(d);
  return `${dt.getFullYear()}년 ${dt.getMonth()+1}월 ${dt.getDate()}일`;
}

function handleImage(e){
  const file = e.target.files[0]; if(!file) return;
  uploadedMime = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = ev => {
    uploadedB64 = ev.target.result.split(',')[1];
    document.getElementById('img-preview').innerHTML = `<img src="${ev.target.result}" class="preview-img" />`;
    document.getElementById('analyze-btn').disabled = false;
  };
  reader.readAsDataURL(file);
}

async function analyzeImage(){
  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span> 분석 중...';
  try{
    const resp = await fetch("/api/generate",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:uploadedMime,data:uploadedB64}},
        {type:"text",text:"이 이미지는 K-POP 콘서트 플레이리스트 또는 셋리스트입니다. 곡 제목 목록만 순서대로 JSON 배열로 출력하세요. 다른 설명 없이 JSON만 출력하세요. 예: [\"Shut Down\",\"Pink Venom\"]"}
      ]}]})
    });
    const data = await resp.json();
    const text = data.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim();
    const list = JSON.parse(text);
    if(Array.isArray(list)&&list.length){ list.forEach(s=>{ if(s&&!songs.includes(s)) songs.push(s); }); renderSongList(); }
    else alert('곡 목록을 찾지 못했어요. 이미지가 선명한지 확인해주세요.');
  }catch(er){ alert('분석 실패. 이미지가 선명한지 확인해주세요.'); }
  btn.disabled = false;
  btn.textContent = '이미지 분석 → 곡 목록 자동 추출';
}

function addSong(){
  const inp = document.getElementById('manual-song');
  const val = inp.value.trim(); if(!val) return;
  if(!songs.includes(val)) songs.push(val);
  inp.value = ''; renderSongList();
}

function removeSong(i){ songs.splice(i,1); renderSongList(); }

function clearSongs(){
  if(!confirm('목록을 초기화하시겠습니까?')) return;
  songs = []; results = {}; renderSongList();
  document.getElementById('results-area').innerHTML = '';
}

function renderSongList(){
  const wrap = document.getElementById('song-list-wrap');
  if(!songs.length){ wrap.style.display='none'; return; }
  wrap.style.display = 'block';
  document.getElementById('song-list').innerHTML = songs.map((s,i)=>`
    <div class="song-item">
      <span class="song-num">${i+1}</span>
      <span class="song-name">${esc(s)}</span>
      <span class="status-badge ${results[s]?'status-done':'status-pending'}">${results[s]?'완료':'대기'}</span>
      <button class="btn-sm" onclick="generateOne(${JSON.stringify(s)},this)">${results[s]?'재생성':'생성'}</button>
      <button class="btn-sm" onclick="removeSong(${i})" style="color:var(--danger);border-color:var(--danger);">삭제</button>
    </div>`).join('');
}

async function generateOne(song, btn){
  const artist  = document.getElementById('artist').value.trim();
  const concert = document.getElementById('concert').value.trim();
  const venue   = getVenue();
  const date    = document.getElementById('date').value;
  const zone    = document.getElementById('zone').value.trim();
  const fanclub = document.getElementById('fanclub').value.trim();
  if(btn){ btn.disabled=true; btn.innerHTML='<span class="loading-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>'; }

  const ds = fmtDate(date);
  const dk = fmtDateKor(date);

  const prompt = `당신은 K-POP 콘서트 직캠 유튜브 채널 전문 카피라이터입니다. SEO 최적화와 팬 유입에 특화된 콘텐츠를 작성합니다.

[콘서트 정보]
- 가수: ${artist}
- 곡명: ${song}
- 콘서트: ${concert}
- 공연장: ${venue}
- 날짜: ${dk}
- 촬영 구역: ${zone||'정보 없음'}
- 팬클럽명: ${fanclub||'팬'}

[작성 규칙]
1. 제목: 가수명과 곡명에 대괄호 없이 그대로 표기. 반드시 100자 이내로 작성.
2. 한국어 설명: 반드시 500자 내외로 작성. 곡명에 따옴표나 대괄호 없이 그대로 표기. 곡의 분위기와 매력, 콘서트 현장감, SEO 키워드(가수명, 곡명, 콘서트명, 공연장, 직캠, fancam 등) 풍부하게 포함. 팬들이 실제로 검색할 단어들 자연스럽게 녹여서 작성. 마지막은 👉 로 마무리.
3. 영어 설명: 한국어 설명 전체를 자연스러운 영어로 번역. 동일한 내용과 분량 유지.
4. 해시태그: 팬 유입 최적화, 영어/한국어 혼합 20개.

아래 형식 그대로 출력. 섹션 구분자 반드시 유지.

===TITLE===
[4K]${artist} - ${song} (Fancam│${ds} ${venue} ${concert})

===DESC_KR===
[500자 내외 한국어 설명 작성]

===DESC_EN===
[한국어 설명 전체를 영어로 번역]

===HASHTAGS===
[해시태그 20개, 한 줄에 하나씩, # 포함]`;

  try{
    const resp = await fetch("/api/generate",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:2000, messages:[{role:"user",content:prompt}]})
    });
    const data = await resp.json();
    const text = data.content.map(i=>i.text||'').join('');
    const parse = (tag,next) => {
      const s = text.indexOf(`===${tag}===`);
      const e = next ? text.indexOf(`===${next}===`) : text.length;
      return s===-1 ? '' : text.slice(s+tag.length+6, e).trim();
    };
    results[song] = {
      title:    parse('TITLE','DESC_KR'),
      descKr:   parse('DESC_KR','DESC_EN'),
      descEn:   parse('DESC_EN','HASHTAGS'),
      hashtags: parse('HASHTAGS',null)
    };
  }catch(er){ results[song]=null; alert(`"${song}" 생성 실패. 다시 시도해주세요.`); }
  if(btn){ btn.disabled=false; btn.textContent='재생성'; }
  renderSongList(); renderResultsArea();
}

async function generateAll(){
  const btn = document.getElementById('gen-all-btn');
  btn.disabled=true; btn.textContent='생성 중...';
  for(const s of songs) await generateOne(s, null);
  btn.disabled=false; btn.textContent='전체 곡 유튜브 정보 생성하기';
}

function renderResultsArea(){
  const area = document.getElementById('results-area');
  const done = songs.filter(s=>results[s]);
  if(!done.length){ area.innerHTML=''; return; }
  area.innerHTML = `<hr class="divider"/><div class="section-label">생성 결과</div>` +
    done.map(s => {
      const r = results[s]; if(!r) return '';
      const sid = 's'+Math.random().toString(36).slice(2,8);
      const descBoth = (r.descKr||'') + '\n\n---\n\n' + (r.descEn||'');
      return `<div style="margin-bottom:1.5rem;">
        <div class="result-song-header">
          <span class="result-song-name">${esc(s)}</span>
          <button class="btn-sm" onclick="saveOne(${JSON.stringify(s)})">저장하기</button>
        </div>
        ${rb('유튜브 제목', r.title, sid+'t')}
        ${rbDesc('설명 (한국어 + 영어)', descBoth, r.descKr, r.descEn)}
        ${rb('해시태그', r.hashtags, sid+'h')}
      </div>`;
    }).join('');
}

function rb(label, text, id){
  return `<div class="result-box">
    <div class="result-label">${label}</div>
    <button class="copy-btn" onclick="cp('r${id}')">복사</button>
    <div class="result-text" id="r${id}">${esc(text)}</div>
  </div>`;
}

function rbDesc(label, both, kr, en){
  const uid = 'desc'+Math.random().toString(36).slice(2,8);
  return `<div class="result-box">
    <div class="result-label">${label}</div>
    <button class="copy-btn" onclick="cpText(${JSON.stringify(both)})">전체복사</button>
    <div class="lang-label" style="margin-top:2px;">🇰🇷 한국어</div>
    <div class="result-text" style="margin-bottom:10px;" id="${uid}kr">${esc(kr)}</div>
    <div class="lang-label">🇺🇸 English</div>
    <div class="result-text" id="${uid}en">${esc(en)}</div>
  </div>`;
}

function cp(id){ const el=document.getElementById(id); if(el) navigator.clipboard.writeText(el.innerText).catch(()=>{}); }
function cpText(text){ navigator.clipboard.writeText(text).catch(()=>{}); }

function saveOne(song){
  const r = results[song]; if(!r) return;
  const db = getDB();
  db.unshift({
    id: Date.now(), song,
    artist:  document.getElementById('artist').value.trim(),
    concert: document.getElementById('concert').value.trim(),
    venue:   getVenue(),
    date:    document.getElementById('date').value,
    zone:    document.getElementById('zone').value.trim(),
    fanclub: document.getElementById('fanclub').value.trim(),
    ...r
  });
  setDB(db); alert(`"${song}" 저장 완료!`);
}

function buildFilters(){
  const db = getDB();
  const artists  = [...new Set(db.map(e=>e.artist).filter(Boolean))];
  const years    = [...new Set(db.map(e=>e.date?e.date.slice(0,4):'').filter(Boolean))].sort().reverse();
  const concerts = [...new Set(db.map(e=>e.concert).filter(Boolean))];
  let html = `<button class="filter-btn active" onclick="setFilter('all',this)">전체</button>`;
  artists.forEach(a  => html+=`<button class="filter-btn" onclick="setFilter(${JSON.stringify(a)},this)">${esc(a)}</button>`);
  years.forEach(y    => html+=`<button class="filter-btn" onclick="setFilter(${JSON.stringify(y)},this)">${y}년</button>`);
  concerts.forEach(c => { const sh=c.length>14?c.slice(0,14)+'…':c; html+=`<button class="filter-btn" onclick="setFilter(${JSON.stringify(c)},this)">${esc(sh)}</button>`; });
  document.getElementById('filter-bar').innerHTML = html;
}

function setFilter(v, el){
  activeFilter = v;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderHistory();
}

function renderHistory(){
  const db = getDB();
  const q = (document.getElementById('search-input')?.value||'').toLowerCase();
  const filtered = db.filter(e => {
    const mf = activeFilter==='all'||e.artist===activeFilter||(e.date&&e.date.startsWith(activeFilter))||e.concert===activeFilter;
    const ms = !q||[e.artist,e.song,e.concert,e.venue].some(f=>(f||'').toLowerCase().includes(q));
    return mf&&ms;
  });
  const list = document.getElementById('history-list');
  if(!filtered.length){ list.innerHTML='<div class="empty">저장된 영상이 없습니다</div>'; return; }
  list.innerHTML = filtered.map(e=>`
    <div class="history-card" onclick="openDetail(${e.id})">
      <div class="history-title">${esc(e.artist)} — ${esc(e.song)}</div>
      <div class="history-meta">${[e.concert,e.venue,e.date,e.zone].filter(Boolean).map(t=>`<span class="htag">${esc(t)}</span>`).join('')}</div>
      <div class="history-preview">${esc((e.title||'').slice(0,80))}</div>
    </div>`).join('');
}

function openDetail(id){
  const e = getDB().find(x=>x.id===id); if(!e) return;
  currentDetailId = id;
  document.getElementById('d-title').textContent = `${e.artist} — ${e.song}`;
  document.getElementById('d-meta').innerHTML = [e.concert,e.venue,e.date].filter(Boolean).map(t=>`<span class="htag">${esc(t)}</span>`).join('');
  const descBoth = (e.descKr||'') + '\n\n---\n\n' + (e.descEn||'');
  document.getElementById('d-results').innerHTML =
    drb('유튜브 제목', e.title, 'dt') +
    drbDesc('설명 (한국어 + 영어)', descBoth, e.descKr, e.descEn) +
    drb('해시태그', e.hashtags, 'dh');
  document.getElementById('overlay').style.display = 'flex';
}

function drb(label, text, id){
  return `<div class="result-box">
    <div class="result-label">${label}</div>
    <button class="copy-btn" onclick="cp('${id}')">복사</button>
    <div class="result-text" id="${id}">${esc(text)}</div>
  </div>`;
}

function drbDesc(label, both, kr, en){
  return `<div class="result-box">
    <div class="result-label">${label}</div>
    <button class="copy-btn" onclick="cpText(${JSON.stringify(both)})">전체복사</button>
    <div class="lang-label" style="margin-top:2px;">🇰🇷 한국어</div>
    <div class="result-text" style="margin-bottom:10px;">${esc(kr||'')}</div>
    <div class="lang-label">🇺🇸 English</div>
    <div class="result-text">${esc(en||'')}</div>
  </div>`;
}

function closeDetail(e){ if(!e||e.target===document.getElementById('overlay')) document.getElementById('overlay').style.display='none'; }

function deleteEntry(){
  if(!currentDetailId||!confirm('삭제하시겠습니까?')) return;
  setDB(getDB().filter(e=>e.id!==currentDetailId));
  closeDetail(); buildFilters(); renderHistory();
}
</script>
</body>
</html>
